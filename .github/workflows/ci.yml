name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint • type • test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with dev + federation extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,federation]"

      - name: Ruff (lint + import order)
        run: ruff check sm_bridge tests

      - name: Mypy (strict)
        run: mypy sm_bridge

      - name: Pytest
        run: pytest -q

  build:
    name: build • twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
